name: Update Movie Features from Letterboxd

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-letterboxd:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Sync Letterboxd to myMovieFeatures.json
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          LETTERBOXD_USERNAME: manusanchi
        run: |
          python update_features_from_letterboxd.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-action@example.com"
          git config --local user.name "GitHub Action Bot"
          
          # Verifica se ci sono cambiamenti
          if git diff --quiet public/myMovieFeatures.json; then
            echo "Nessun cambiamento nei film"
          else
            git add public/myMovieFeatures.json
            git commit -m "chore: Update movie features from Letterboxd $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

